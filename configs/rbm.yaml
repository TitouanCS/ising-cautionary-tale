# ----- Physics -----
M0: 0.0
T_c: 2.269185314213022
Ls: [8, 12]
T_min: 1.0
T_max: 3.0
n_T: 9

# ----- Monte Carlo -----
n_configs_per_T: 10000
n_thermalize_sweeps: 20000    # permet aux interfaces de fluctuer sans dériver complètement
decorrelation_base: 30        # base raisonnable, le multiplicateur adaptatif gère T_c
init_mode: stripes            # part dans le ground state pour M=0 sur L pair

# ----- RBM training -----
rbm:
  n_hidden_factor: 1.0
  n_epochs: 2000              # comme le papier
  batch_size: 100
  lr: 2.5e-3                  # moitié du papier (compense facteur 2 de la conv ±1)
  cd_k: 20
  n_train_configs: 10000

# ----- RBM generation -----
n_gen_configs: 10000
gibbs_k_gen: 5000
gibbs_n_chains: 200

seed: 42

# ----- I/O -----
data_dir: "data/raw_rbm"
results_dir: "data/results_rbm"